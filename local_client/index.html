<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat — Colab/Kaggle Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #252836;
      --border:    #2e3147;
      --accent:    #7c6af7;
      --accent-dk: #5f50d4;
      --text:      #e2e4ef;
      --muted:     #7b7f96;
      --user-bg:   #2d3058;
      --bot-bg:    #1e2135;
      --danger:    #e05c6b;
      --ok:        #4caf89;
      --radius:    12px;
    }

    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; }

    /* ── Header ── */
    header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.05rem; font-weight: 600; }
    header .model-badge {
      font-size: 0.72rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--muted);
    }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--danger); flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.ok { background: var(--ok); }
    .spacer { flex: 1; }
    #settingsBtn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 0.8rem;
      transition: border-color 0.2s, color 0.2s;
    }
    #settingsBtn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Settings panel ── */
    #settingsPanel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    #settingsPanel.open { display: flex; }
    .settings-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .settings-row label { font-size: 0.78rem; color: var(--muted); min-width: 90px; }
    .settings-row input, .settings-row textarea {
      flex: 1; min-width: 200px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 0.85rem;
      outline: none; transition: border-color 0.2s;
    }
    .settings-row input:focus, .settings-row textarea:focus { border-color: var(--accent); }
    .settings-row textarea { resize: vertical; min-height: 56px; font-family: inherit; }
    #applyBtn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 0.85rem;
      font-weight: 600; transition: background 0.2s;
    }
    #applyBtn:hover { background: var(--accent-dk); }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: 10px; max-width: 78%; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700;
    }
    .msg.user .avatar { background: var(--accent); color: #fff; }
    .msg.bot  .avatar { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .bubble {
      padding: 10px 14px; border-radius: var(--radius);
      line-height: 1.55; font-size: 0.92rem; word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble { background: var(--user-bg); border-bottom-right-radius: 3px; }
    .msg.bot  .bubble { background: var(--bot-bg);  border-bottom-left-radius: 3px; border: 1px solid var(--border); }

    /* Typing indicator */
    .typing .bubble { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Empty state */
    #emptyState {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--muted); text-align: center; padding: 40px;
    }
    #emptyState .icon { font-size: 2.8rem; }
    #emptyState p { font-size: 0.9rem; line-height: 1.5; max-width: 340px; }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    #userInput {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px; padding: 10px 14px;
      font-size: 0.92rem; font-family: inherit; resize: none; max-height: 140px;
      outline: none; transition: border-color 0.2s; line-height: 1.4;
    }
    #userInput:focus { border-color: var(--accent); }
    #userInput::placeholder { color: var(--muted); }

    .bar-actions { display: flex; gap: 8px; }
    #clearBtn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 0 12px; height: 40px; cursor: pointer;
      font-size: 0.8rem; transition: border-color 0.2s, color 0.2s;
    }
    #clearBtn:hover { border-color: var(--danger); color: var(--danger); }
    #sendBtn {
      background: var(--accent); border: none; color: #fff;
      border-radius: 8px; width: 40px; height: 40px; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s; flex-shrink: 0;
    }
    #sendBtn:hover:not(:disabled) { background: var(--accent-dk); }
    #sendBtn:active:not(:disabled) { transform: scale(0.93); }
    #sendBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--danger); color: #fff; padding: 9px 18px;
      border-radius: 8px; font-size: 0.83rem; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; z-index: 100;
      max-width: 90vw; text-align: center;
    }
    #toast.show { opacity: 1; }

    @media (max-width: 600px) {
      .msg { max-width: 90%; }
      .settings-row { flex-direction: column; align-items: flex-start; }
      .settings-row input, .settings-row textarea { min-width: 0; width: 100%; }
    }
  </style>
</head>
<body>

<!-- file:// warning — hidden by default, shown by JS when needed -->
<div id="fileWarning" style="
  display:none; position:fixed; top:0; left:0; right:0; z-index:999;
  background:#c0392b; color:#fff; text-align:center;
  padding:10px 16px; font-size:0.84rem; line-height:1.5;">
  ⚠️ You opened this file directly from disk (<code>file://</code>).
  Browsers block outgoing requests from <code>file://</code> pages.
  <strong>Run the local server instead:</strong>
  &nbsp;<code>python3 serve.py</code>&nbsp; then open
  &nbsp;<code>http://localhost:3000</code>
</div>

<div class="app">

  <!-- Header -->
  <header>
    <span class="status-dot" id="statusDot" title="Connection status"></span>
    <h1>AI Chat</h1>
    <span class="model-badge" id="modelBadge">not connected</span>
    <span class="spacer"></span>
    <button id="settingsBtn" onclick="toggleSettings()">⚙ Settings</button>
  </header>

  <!-- Settings panel -->
  <div id="settingsPanel">
    <div class="settings-row">
      <label>ngrok URL</label>
      <input id="cfgUrl" type="text" placeholder="https://xxxx-xx-xx.ngrok-free.app" spellcheck="false" />
    </div>
    <div class="settings-row">
      <label>API Key</label>
      <input id="cfgKey" type="password" placeholder="change-me-to-something-random" spellcheck="false" />
    </div>
    <div class="settings-row">
      <label>System prompt</label>
      <textarea id="cfgSystem" rows="2">You are a helpful and friendly AI assistant. Keep answers concise.</textarea>
    </div>
    <div class="settings-row">
      <label></label>
      <button id="applyBtn" onclick="applySettings()">Connect</button>
    </div>
  </div>

  <!-- Message list -->
  <div id="messages">
    <div id="emptyState">
      <div class="icon">🤖</div>
      <p>Open <strong>Settings</strong>, paste your ngrok URL from Colab/Kaggle, and start chatting.</p>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea id="userInput" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for new line)" disabled></textarea>
    <div class="bar-actions">
      <button id="clearBtn" onclick="clearChat()" title="Clear conversation">Clear</button>
      <button id="sendBtn" onclick="sendMessage()" disabled title="Send (Enter)">&#9650;</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  // ── State ─────────────────────────────────────────────────
  let NGROK_URL    = localStorage.getItem("ngrok_url")    || "";
  let API_KEY      = localStorage.getItem("api_key")      || "";
  let SYSTEM_PROMPT = localStorage.getItem("system_prompt") || "You are a helpful and friendly AI assistant. Keep answers concise.";
  let history      = [];   // [{role, content}, ...]
  let busy         = false;

  // ── Detect file:// origin and warn ───────────────────────
  if (location.protocol === "file:") {
    const banner = document.getElementById("fileWarning");
    banner.style.display = "block";
    document.querySelector(".app").style.paddingTop = "56px";
  }

  // ── Boot: try config.json first, then localStorage ────────
  window.addEventListener("DOMContentLoaded", async () => {
    autoResize(document.getElementById("userInput"));

    // 1. Try loading config.json dropped next to index.html
    let loadedFromFile = false;
    try {
      const resp = await fetch("/config.json", { cache: "no-store" });
      if (resp.ok) {
        const cfg = await resp.json();
        if (cfg.ngrok_url)      { NGROK_URL     = cfg.ngrok_url;      localStorage.setItem("ngrok_url",     NGROK_URL); }
        if (cfg.api_secret_key) { API_KEY        = cfg.api_secret_key; localStorage.setItem("api_key",       API_KEY); }
        if (cfg.system_prompt)  { SYSTEM_PROMPT  = cfg.system_prompt;  localStorage.setItem("system_prompt", SYSTEM_PROMPT); }
        loadedFromFile = true;
        showBanner(`Config loaded from config.json — model: ${cfg.model_id || "?"} · device: ${cfg.device || "?"}`, "ok");
      }
    } catch (_) { /* no config.json present — fall through */ }

    // 2. Fall back to whatever is stored in localStorage
    document.getElementById("cfgUrl").value    = NGROK_URL;
    document.getElementById("cfgKey").value    = API_KEY;
    document.getElementById("cfgSystem").value = SYSTEM_PROMPT;

    if (NGROK_URL) {
      // Auto-connect silently
      await applySettings(/*silent=*/true);
    } else {
      // Nothing configured yet — open settings panel
      toggleSettings();
    }
  });

  // ── Settings ──────────────────────────────────────────────
  function toggleSettings() {
    const panel = document.getElementById("settingsPanel");
    panel.classList.toggle("open");
  }

  async function applySettings(silent = false) {
    const url  = document.getElementById("cfgUrl").value.trim().replace(/\/$/, "");
    const key  = document.getElementById("cfgKey").value.trim();
    const sys  = document.getElementById("cfgSystem").value.trim();

    if (!url) { showToast("Please enter a ngrok URL."); return; }

    NGROK_URL     = url;
    API_KEY       = key;
    SYSTEM_PROMPT = sys || SYSTEM_PROMPT;

    localStorage.setItem("ngrok_url",     NGROK_URL);
    localStorage.setItem("api_key",       API_KEY);
    localStorage.setItem("system_prompt", SYSTEM_PROMPT);

    document.getElementById("modelBadge").textContent = "connecting…";
    document.getElementById("statusDot").className    = "status-dot";

    try {
      const resp = await fetch(`${NGROK_URL}/`, {
        headers: apiHeaders(),
        signal: AbortSignal.timeout(6000),
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const info = await resp.json();

      document.getElementById("statusDot").classList.add("ok");
      document.getElementById("modelBadge").textContent =
        `${info.model || "unknown"} · ${info.device || "?"}`;

      enableInput(true);
      if (!silent) document.getElementById("settingsPanel").classList.remove("open");
    } catch (err) {
      document.getElementById("modelBadge").textContent = "connection failed";
      showToast(`Cannot reach server: ${err.message}`);
    }
  }

  function apiHeaders() {
    const h = {
      "Content-Type": "application/json",
      // Bypasses the ngrok browser-warning interstitial page.
      // Without this header the preflight OPTIONS request hits the warning page
      // (which has no CORS headers) and the browser blocks the fetch entirely.
      "ngrok-skip-browser-warning": "1",
    };
    if (API_KEY) h["x-api-key"] = API_KEY;
    return h;
  }

  function enableInput(on) {
    document.getElementById("userInput").disabled = !on;
    document.getElementById("sendBtn").disabled   = !on;
    if (on) document.getElementById("userInput").focus();
  }

  // ── Sending messages ──────────────────────────────────────
  async function sendMessage() {
    if (busy) return;
    const input = document.getElementById("userInput");
    const text  = input.value.trim();
    if (!text) return;

    input.value = "";
    autoResize(input);

    removeEmptyState();
    appendMessage("user", text);
    history.push({ role: "user", content: text });

    busy = true;
    document.getElementById("sendBtn").disabled = true;
    const typingEl = appendTyping();

    try {
      const resp = await fetch(`${NGROK_URL}/chat`, {
        method: "POST",
        headers: apiHeaders(),
        body: JSON.stringify({
          messages: history,
          system_prompt: SYSTEM_PROMPT,
          max_new_tokens: 512,
          temperature: 0.7,
        }),
        signal: AbortSignal.timeout(120_000),
      });

      typingEl.remove();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }

      const data  = await resp.json();
      const reply = data.content || "(empty response)";
      history.push({ role: "assistant", content: reply });
      appendMessage("bot", reply);

    } catch (err) {
      typingEl.remove();
      showToast(`Error: ${err.message}`);
      // remove last user message from history so user can retry
      history.pop();
    } finally {
      busy = false;
      document.getElementById("sendBtn").disabled = false;
      document.getElementById("userInput").focus();
    }
  }

  function clearChat() {
    history = [];
    const msgs = document.getElementById("messages");
    msgs.innerHTML = "";
    msgs.appendChild(buildEmptyState());
  }

  // ── DOM helpers ───────────────────────────────────────────
  function removeEmptyState() {
    document.getElementById("emptyState")?.remove();
  }

  function buildEmptyState() {
    const div = document.createElement("div");
    div.id = "emptyState";
    div.innerHTML = `<div class="icon">🤖</div>
      <p>Open <strong>Settings</strong>, paste your ngrok URL from Colab/Kaggle, and start chatting.</p>`;
    return div;
  }

  function appendMessage(role, text) {
    const msgs   = document.getElementById("messages");
    const isUser = role === "user";

    const wrap   = document.createElement("div");
    wrap.className = `msg ${isUser ? "user" : "bot"}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = isUser ? "Y" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  function appendTyping() {
    const msgs = document.getElementById("messages");
    const wrap = document.createElement("div");
    wrap.className = "msg bot typing";
    wrap.innerHTML = `<div class="avatar">AI</div>
      <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 4000);
  }

  // ── Dismissible info banner (for config.json auto-load) ───
  function showBanner(msg, type = "ok") {
    let banner = document.getElementById("infoBanner");
    if (!banner) {
      banner = document.createElement("div");
      banner.id = "infoBanner";
      banner.style.cssText = `
        position:fixed; top:0; left:0; right:0; z-index:998;
        padding:9px 40px 9px 16px; font-size:0.82rem; text-align:center;
        transition: opacity 0.4s;
      `;
      const close = document.createElement("span");
      close.textContent = "✕";
      close.style.cssText = "position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;opacity:0.7;";
      close.onclick = () => banner.remove();
      banner.appendChild(close);
      document.body.prepend(banner);
    }
    banner.style.background = type === "ok" ? "#1e6b45" : "#c0392b";
    banner.style.color = "#fff";
    // insert message text node before the close button
    banner.childNodes[0]?.nodeType === 3
      ? (banner.childNodes[0].textContent = msg)
      : banner.insertBefore(document.createTextNode(msg), banner.firstChild);
    document.querySelector(".app").style.paddingTop = "38px";
    setTimeout(() => { banner?.remove(); document.querySelector(".app").style.paddingTop = ""; }, 6000);
  }

  // ── Auto-resize textarea ──────────────────────────────────
  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }

  document.getElementById("userInput").addEventListener("input", function () {
    autoResize(this);
  });

  document.getElementById("userInput").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
